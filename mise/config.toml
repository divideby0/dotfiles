# mise global configuration
# This file goes in ~/.config/mise/config.toml
# See: https://mise.jdx.dev/configuration.html

[settings]
# Use shims for better shell startup performance
experimental = true

# Don't auto-install tools (manual control)
auto_install = false

# Trust all config files by default (set to false for stricter security)
trusted_config_paths = ["~"]

[tools]
argo = "3.5.12"
aws-iam-authenticator = "0.7.18"
awscli = { version = "2.35.6", symlink_bins = "true" }
bun = "1.3.14"
deno = "2.8.3"
doctl = "1.162.0"
eksctl = "0.227.0"
eza = "0.23.4"
go = "1.23.3"
gradle = "8.11"
helm = "3.16.2"
java = "openjdk-23"
just = "1.52.0"
k9s = "0.51.0"
kind = "0.32.0"
kops = "v1.30.1"
krew = "0.5.0"
kubectl = "1.31.2"
kubectx = "0.11.0"
kubie = "0.28.0"
kustomize = "5.8.1"
maven = "3.9.16"
node = "22.11.0"
nomad = "1.9.3"
pnpm = "9.12.3"
poetry = "1.8.4"
pulumi = "3.246.0"
python = "3.13.3"
redis = "8.8.0"
ruby = "3.3.5"
rust = "1.96.0"
skaffold = "2.22.0"
sops = "3.13.1"
starship = "1.25.1"
stern = "1.34.0"
terraform = "1.9.8"
terragrunt = "0.68.10"
tilt = "0.37.4"
uv = "0.11.21"
velero = "1.15.0"
yarn = "1.22.22"
zellij = "0.44.3"
